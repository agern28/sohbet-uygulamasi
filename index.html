<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gizli Sohbet Odası</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background-color: #111827; color: #f3f4f6; height: 100vh; display: flex; flex-direction: column; }
    input, button { font-family: 'Inter', sans-serif; outline: none; }
    button { cursor: pointer; transition: opacity 0.2s; }
    button:hover { opacity: 0.8; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>

<div id="root"></div>

<!-- ⚠️ FIREBASE CONFIG — Okey oyunundaki aynı bilgileri buraya yapıştır -->
<script>
  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyAd4SwHUeIuPTPPR2uo-Dw93oqduiFBn6k",

  authDomain: "okey-toprak.firebaseapp.com",

  databaseURL: "https://okey-toprak-default-rtdb.europe-west1.firebasedatabase.app",

  projectId: "okey-toprak",

  storageBucket: "okey-toprak.firebasestorage.app",

  messagingSenderId: "886206245042",

  appId: "1:886206245042:web:fe0a21a48306b9de61c1ab",

  measurementId: "G-W647Z30EJE"
  };
</script>

<!-- Firebase & React Kütüphaneleri -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel" data-presets="env,react">
  const { useState, useEffect, useRef } = React;

  // Firebase Başlatma
  let _db = null;
  let _firebaseReady = false;
  try {
    if (FIREBASE_CONFIG.apiKey && !FIREBASE_CONFIG.apiKey.startsWith('PASTE')) {
      firebase.initializeApp(FIREBASE_CONFIG);
      _db = firebase.database();
      _firebaseReady = true;
    }
  } catch (e) {
    console.error("Firebase başlatılamadı:", e);
  }

  // --- GİRİŞ EKRANI (İsim sorma) ---
  function LoginScreen({ onLogin }) {
    const [name, setName] = useState('');
    return (
      <div style={{ display: 'flex', height: '100vh', alignItems: 'center', justifyContent: 'center', background: '#111827' }}>
        <div style={{ background: '#1f2937', padding: '40px', borderRadius: '12px', width: '90%', maxWidth: '400px', boxShadow: '0 10px 25px rgba(0,0,0,0.5)', textAlign: 'center' }}>
          <h1 style={{ marginBottom: '8px', fontSize: '24px', color: '#60a5fa' }}>Sohbet Odası</h1>
          <p style={{ marginBottom: '24px', color: '#9ca3af', fontSize: '14px' }}>Arkadaşlarınla konuşmak için bir takma ad gir.</p>
          <input 
            type="text" 
            placeholder="İsmin nedir?" 
            value={name} 
            onChange={(e) => setName(e.target.value)}
            onKeyDown={(e) => e.key === 'Enter' && name.trim() && onLogin(name.trim())}
            style={{ width: '100%', padding: '12px', borderRadius: '8px', border: '1px solid #374151', background: '#111827', color: 'white', marginBottom: '16px', fontSize: '16px' }}
          />
          <button 
            onClick={() => name.trim() && onLogin(name.trim())}
            style={{ width: '100%', padding: '12px', borderRadius: '8px', border: 'none', background: '#3b82f6', color: 'white', fontSize: '16px', fontWeight: '600' }}
          >
            Sohbete Katıl
          </button>
        </div>
      </div>
    );
  }

  // --- SOHBET EKRANI ---
  function ChatScreen({ username, onLogout }) {
    const [messages, setMessages] = useState([]);
    const [text, setText] = useState('');
    const messagesEndRef = useRef(null);

    // Mesajları dinleme
    useEffect(() => {
      const ref = _db.ref('chats');
      // Son 50 mesajı getir ve yeni mesajları dinle
      const listener = ref.limitToLast(50).on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
          // Firebase objesini array'e çevir
          const msgArray = Object.keys(data).map(key => ({
            id: key,
            ...data[key]
          }));
          setMessages(msgArray);
        } else {
          setMessages([]);
        }
      });
      return () => ref.off('value', listener);
    }, []);

    // Yeni mesaj gelince en alta kaydır
    useEffect(() => {
      messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
    }, [messages]);

    // Mesaj Gönderme Fonksiyonu
    const sendMessage = async (e) => {
      e.preventDefault();
      if (!text.trim()) return;
      
      const newMsg = {
        text: text.trim(),
        sender: username,
        timestamp: Date.now()
      };
      
      setText(''); // Inputu temizle
      await _db.ref('chats').push(newMsg); // Firebase'e gönder
    };

    // Zamanı formatlama (Örn: 14:30)
    const formatTime = (ts) => {
      return new Date(ts).toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
    };

    return (
      <div style={{ display: 'flex', flexDirection: 'column', height: '100vh', maxWidth: '800px', margin: '0 auto', width: '100%', background: '#1f2937', boxShadow: '0 0 20px rgba(0,0,0,0.5)' }}>
        {/* Header */}
        <div style={{ padding: '16px 20px', background: '#111827', borderBottom: '1px solid #374151', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div>
            <h2 style={{ fontSize: '18px', color: '#f3f4f6' }}># genel-sohbet</h2>
            <span style={{ fontSize: '12px', color: '#10b981' }}>● Canlı Bağlantı</span>
          </div>
          <button onClick={onLogout} style={{ background: 'transparent', border: '1px solid #ef4444', color: '#ef4444', padding: '6px 12px', borderRadius: '6px', fontSize: '14px' }}>Çıkış</button>
        </div>

        {/* Mesaj Listesi */}
        <div style={{ flex: 1, overflowY: 'auto', padding: '20px', display: 'flex', flexDirection: 'column', gap: '12px' }}>
          {messages.length === 0 ? (
            <div style={{ textAlign: 'center', color: '#6b7280', marginTop: '40px' }}>Henüz hiç mesaj yok. İlk yazan sen ol!</div>
          ) : (
            messages.map((msg) => {
              const isMe = msg.sender === username;
              return (
                <div key={msg.id} style={{ display: 'flex', flexDirection: 'column', alignItems: isMe ? 'flex-end' : 'flex-start' }}>
                  {!isMe && <span style={{ fontSize: '12px', color: '#9ca3af', marginBottom: '4px', marginLeft: '4px' }}>{msg.sender}</span>}
                  <div style={{ 
                    background: isMe ? '#3b82f6' : '#374151', 
                    color: '#fff', 
                    padding: '10px 16px', 
                    borderRadius: isMe ? '16px 16px 4px 16px' : '16px 16px 16px 4px',
                    maxWidth: '80%',
                    wordBreak: 'break-word'
                  }}>
                    {msg.text}
                  </div>
                  <span style={{ fontSize: '10px', color: '#6b7280', marginTop: '4px', marginRight: '4px' }}>{formatTime(msg.timestamp)}</span>
                </div>
              );
            })
          )}
          <div ref={messagesEndRef} />
        </div>

        {/* Mesaj Gönderme Alanı */}
        <form onSubmit={sendMessage} style={{ padding: '16px', background: '#111827', borderTop: '1px solid #374151', display: 'flex', gap: '10px' }}>
          <input 
            type="text" 
            value={text}
            onChange={(e) => setText(e.target.value)}
            placeholder="Bir şeyler yaz..." 
            style={{ flex: 1, padding: '12px 16px', borderRadius: '24px', border: '1px solid #374151', background: '#1f2937', color: 'white', fontSize: '15px' }}
          />
          <button type="submit" disabled={!text.trim()} style={{ background: '#3b82f6', color: 'white', border: 'none', borderRadius: '24px', padding: '0 24px', fontWeight: '600' }}>
            Gönder
          </button>
        </form>
      </div>
    );
  }

  // --- ANA UYGULAMA ---
  function App() {
    const [username, setUsername] = useState(null);

    if (!_firebaseReady) {
      return (
        <div style={{ padding: '40px', textAlign: 'center', color: '#fca5a5' }}>
          <h2>⚠️ Firebase Ayarları Eksik</h2>
          <p>Kodu çalıştırmadan önce HTML içindeki FIREBASE_CONFIG kısmını kendi veritabanı bilgilerinle doldurmalısın.</p>
        </div>
      );
    }

    if (!username) {
      return <LoginScreen onLogin={setUsername} />;
    }

    return <ChatScreen username={username} onLogout={() => setUsername(null)} />;
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>

</body>
</html>
